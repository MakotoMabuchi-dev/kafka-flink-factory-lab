services:
  superset:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-lab-superset:6.0.0
    container_name: superset
    restart: unless-stopped
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: lab-superset-secret-key
      ADMIN_USERNAME: admin
      ADMIN_FIRSTNAME: Lab
      ADMIN_LASTNAME: Admin
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin
      SUPERSET_TRINO_DATABASE_NAME: trino_iceberg_lab
      SUPERSET_TRINO_SQLALCHEMY_URI: trino://trino@trino:8080/iceberg
    volumes:
      - ./data:/app/superset_home
      - ./pythonpath:/app/pythonpath
      - ./scripts:/app/lab-scripts
    command: ["bash", "/app/lab-scripts/start_lab_superset.sh"]
    networks:
      - stream-shared
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

networks:
  stream-shared:
    external: true
